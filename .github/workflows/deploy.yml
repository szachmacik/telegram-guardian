name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying telegram-guardian → Coolify uuid=qook8w0sw4o404swcoookg00"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=qook8w0sw4o404swcoookg00&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
